name: checkin_app
description: A check-in recording app with HyperOS style.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0

  # UI Components
  table_calendar: ^3.1.0
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  iconsax: ^0.0.8

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.3
  csv: ^8.0.0
  share_plus: ^13.1.0
  permission_handler: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  image: ^4.1.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/animations/
